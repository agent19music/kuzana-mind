name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  PROJECT_ID: mavuno-493709
  REGION: europe-west1
  SERVICE: kuzana-brain-backend
  IMAGE: europe-west1-docker.pkg.dev/mavuno-493709/kuzana-brain/backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            backend/
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Run database migrations
        run: |
          gcloud run jobs create migration \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --command=alembic \
            --args=upgrade,head \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:kuzana-brain-db \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --max-retries=0 2>/dev/null || \
          gcloud run jobs update migration \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}
          gcloud run jobs execute migration \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:kuzana-brain-db \
            --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest,AUTOSEND_API_KEY=AUTOSEND_API_KEY:latest,AUTOSEND_TEMPLATE_ID=AUTOSEND_TEMPLATE_ID:latest \
            --set-env-vars=USE_MOCK=true \
            --port=8000 \
            --memory=512Mi \
            --project=${{ env.PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)"
